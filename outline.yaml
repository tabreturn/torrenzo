subject:
  id: FRU101
  title: Tropical Fruit Studies

subject_descriptor: >
  Tropical Fruit Studies is a playful placeholder subject celebrating the
  delightful variety, color, and texture of fruits from around the world.

slo:
  - id: a
    description: >
      Identify and describe tropical fruits using sensory vocabulary like aroma,
      sweetness, and texture.

  - id: b
    description: >
      Sketch fruit compositions with simple labels and captions to record
      seasonal availability.

  - id: c
    description: >
      Organize a digital collection of fruit images and notes, applying a
      consistent tagging scheme for easy reference.

  - id: d
    description: >
      Share a brief write-up that compares two different fruits and what makes
      each one unique in presentation and flavor.

assessment:
  - id: 1
    title: Seasonal Fruit Catalog
    individual_group: Individual
    length: One page of notes plus a small media folder
    slo: [a, b, c]
    submission: Due by 23h55 GMT on the final weekend of the learning block
    weighting: 10%
    total_marks: 25

  - id: 2
    title: Playful Fruit Journal
    individual_group: Individual
    length: Two short reflections plus media folder
    slo: [a, c]
    submission: Due by 23h55 GMT on the final weekend of the learning block
    weighting: 10%
    total_marks: 25
