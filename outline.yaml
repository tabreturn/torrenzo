subject_descriptor: >
  Tropical Fruit Studies is a playful placeholder subject celebrating the
  delightful variety, color, and texture of fruits from around the world.

  Students follow a light-hearted exploration of taste, seasonality, and
  cultural traditions while learning to catalog their findings with basic
  observation practices.

subject_learning_outcomes:
  - code: a
    description: >
      Identify and describe three tropical fruits using sensory vocabulary like
      aroma, sweetness, and texture.

  - code: b
    description: >
      Sketch fruit compositions with simple labels and captions to record
      seasonal availability.

  - code: c
    description: >
      Organize a digital collection of fruit images and notes, applying a
      consistent tagging scheme for easy reference.

  - code: d
    description: >
      Share a brief playful write-up that compares two different fruits and
      what makes each one unique in presentation and flavor.

