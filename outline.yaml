subject_descriptor: >
  Tropical Fruit Studies is a playful placeholder subject celebrating the
  delightful variety, color, and texture of fruits from around the world.

  Students follow an light-hearted exploration of taste, seasonality, and
  cultural traditions while learning to catalogue their findings with basic
  observation practices.

slo:
  - code: a
    description: >
      Identify and describe tropical fruits using sensory vocabulary like
      aroma, sweetness, and texture.

  - code: b
    description: >
      Sketch fruit compositions with simple labels and captions to record
      seasonal availability.

  - code: c
    description: >
      Organize a digital collection of fruit images and notes, applying a
      consistent tagging scheme for easy reference.

  - code: d
    description: >
      Share a brief write-up that compares two different fruits and what 
      makes each one unique in presentation and flavor.

