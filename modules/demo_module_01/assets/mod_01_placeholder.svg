<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Citrus fruit illustration">
  <defs>
    <radialGradient id="peel" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd56a"/>
      <stop offset="65%" stop-color="#ffb22c"/>
      <stop offset="100%" stop-color="#f28c00"/>
    </radialGradient>
    <radialGradient id="flesh" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffb000"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- whole fruit -->
  <g filter="url(#shadow)">
    <circle cx="170" cy="240" r="110" fill="url(#peel)" stroke="#d97706" stroke-width="8"/>
    <ellipse cx="135" cy="195" rx="28" ry="16" fill="#fff3" transform="rotate(-25 135 195)"/>
    <path d="M170 118c10-20 32-34 58-35-15 14-18 34-14 49-16-4-32-9-44-14z" fill="#3f9b3a"/>
    <path d="M181 126c4-15 13-28 27-38" fill="none" stroke="#2f6f2c" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- sliced citrus -->
  <g filter="url(#shadow)">
    <circle cx="320" cy="275" r="128" fill="#ffcc5c" stroke="#d97706" stroke-width="10"/>
    <circle cx="320" cy="275" r="108" fill="url(#flesh)" stroke="#fff1c4" stroke-width="6"/>
    <circle cx="320" cy="275" r="16" fill="#fff7dc"/>

    <!-- segments -->
    <g stroke="#fff7dc" stroke-width="8" stroke-linecap="round">
      <line x1="320" y1="275" x2="320" y2="167"/>
      <line x1="320" y1="275" x2="374" y2="181"/>
      <line x1="320" y1="275" x2="414" y2="221"/>
      <line x1="320" y1="275" x2="428" y2="275"/>
      <line x1="320" y1="275" x2="414" y2="329"/>
      <line x1="320" y1="275" x2="374" y2="369"/>
      <line x1="320" y1="275" x2="320" y2="383"/>
      <line x1="320" y1="275" x2="266" y2="369"/>
      <line x1="320" y1="275" x2="226" y2="329"/>
      <line x1="320" y1="275" x2="212" y2="275"/>
      <line x1="320" y1="275" x2="226" y2="221"/>
      <line x1="320" y1="275" x2="266" y2="181"/>
    </g>

    <!-- rind texture -->
    <circle cx="320" cy="275" r="121" fill="none" stroke="#ffdf8f" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
  </g>
</svg>
