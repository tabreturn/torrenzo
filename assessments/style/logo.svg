It looks much nicer than the typical Markdown→PDF output.

nah - -log appearing over content

That means the logo is fixed to the page, but your content starts too high.

So you need to increase the top page margin enough to reserve space for the logo.

Use this pattern:

@page {
    size: A4;
    margin: 42mm 18mm 20mm 18mm;
}

body::before {
    content: "";
    position: fixed;
    top: 8mm;
    left: 10mm;
    width: 36mm;
    height: 12mm;
    background: url("style/logo.png") no-repeat left center / contain;
}

The key point is:

    top: 8mm puts the logo near the top

    height: 12mm makes the logo 12mm tall

    margin-top: 42mm gives the page content enough room below it

A safe rule is:

top margin >= logo top offset + logo height + extra breathing room

So with:

    top: 8mm

    height: 12mm

you want at least about:

    8 + 12 + 10 = 30mm

But in practice, use 36–45mm to avoid collisions with headings.

Try this:

@page {
    size: A4;
    margin: 45mm 18mm 20mm 18mm;
}

body::before {
    content: "";
    position: fixed;
    top: 6mm;
    left: 10mm;
    width: 36mm;
    height: 12mm;
    background: url("style/logo.png") no-repeat left center / contain;
}

If you also have a divider line, keep it inside that reserved header area:

body::after {
    content: "";
    position: fixed;
    top: 24mm;
    left: 18mm;
    right: 18mm;
    border-bottom: 1px solid var(--border);
}

Working combo:

@page {
    size: A4;
    margin: 45mm 18mm 20mm 18mm;
}

body::before {
    content: "";
    position: fixed;
    top: 6mm;
    left: 10mm;
    width: 36mm;
    height: 12mm;
    background: url("style/logo.png") no-repeat left center / contain;
}

body::after {
    content: "";
    position: fixed;
    top: 24mm;
    left: 18mm;
    right: 18mm;
    border-bottom: 1px solid var(--border);
}

If it still overlaps, the fastest fix is just:

    reduce logo height a bit

    increase @page top margin more

For example:

@page { margin: 50mm 18mm 20mm 18mm; }

The overlap is not because the logo is wrong; it’s because fixed elements don’t push document flow down. Only the @page top margin does that.

