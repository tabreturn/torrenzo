Viewing md-to-pdf version 5.2.5

With md-to-pdf, headers and footers come from Puppeteer’s headerTemplate / footerTemplate, passed inside pdf_options. There are three practical ways to add them when running from the command line.
1. Best method: use Markdown front-matter

Put the header/footer config at the top of your .md file.

---
pdf_options:
  format: A4
  margin: 25mm 20mm
  printBackground: true
  headerTemplate: |-
    <style>
      .hdr {
        font-family: InterVariable;
        font-size: 10px;
        width: 100%;
        text-align: center;
        color: #555;
      }
    </style>
    <div class="hdr">
      <span class="title"></span>
      — 
      <span class="date"></span>
    </div>

  footerTemplate: |-
    <style>
      .ftr {
        font-family: InterVariable;
        font-size: 10px;
        width: 100%;
        text-align: center;
        color: #777;
      }
    </style>
    <div class="ftr">
      Page <span class="pageNumber"></span>
      / <span class="totalPages"></span>
    </div>
---

# My Document

Then run:

md-to-pdf doc.md --stylesheet style.css --page-media-type print

Important:

    Margins must be large enough or the header/footer will overlap content.

    displayHeaderFooter is automatically enabled when templates exist.

2. Pass it directly via CLI

You can embed it inside --pdf-options.

Example:

md-to-pdf doc.md \
  --stylesheet style.css \
  --page-media-type print \
  --pdf-options '{
    "format":"A4",
    "margin":"25mm 20mm",
    "printBackground":true,
    "headerTemplate":"<div style=\"font-size:10px;width:100%;text-align:center\"> <span class=\"title\"></span> </div>",
    "footerTemplate":"<div style=\"font-size:10px;width:100%;text-align:center\">Page <span class=\"pageNumber\"></span> / <span class=\"totalPages\"></span></div>"
  }'

This works but becomes messy quickly.
3. Best for real projects: config file

Create pdf.config.js.

module.exports = {
  stylesheet: ['style.css'],
  page_media_type: 'print',
  pdf_options: {
    format: 'A4',
    margin: '25mm 20mm',
    printBackground: true,

    headerTemplate: `
      <style>
        .hdr{
          font-family: InterVariable;
          font-size:10px;
          width:100%;
          text-align:center;
          color:#666;
        }
      </style>
      <div class="hdr">
        <span class="title"></span>
      </div>
    `,

    footerTemplate: `
      <div style="font-family:InterVariable;font-size:10px;text-align:center;width:100%">
        Page <span class="pageNumber"></span> / <span class="totalPages"></span>
      </div>
    `
  }
}

Run:

md-to-pdf doc.md --config-file pdf.config.js

Available dynamic values

These Puppeteer classes automatically get replaced:
class	value
.pageNumber	current page
.totalPages	total pages
.date	print date
.title	document title
.url	page URL

Example:

Page <span class="pageNumber"></span> of <span class="totalPages"></span>

Important gotcha

Puppeteer header/footer do not inherit your stylesheet, so fonts must be declared again if you want custom fonts.

Example inside headerTemplate:

<style>
@font-face {
  font-family: InterVariable;
  src: url("style/InterVariable.ttf") format("truetype");
}
</style>

✅ Recommendation

For your workflow:

md-to-pdf mydoc.md \
  --stylesheet print.css \
  --page-media-type print \
  --config-file pdf.config.js

This keeps:

    Markdown clean

    styles in CSS

    headers/footers in config

If you want, I can also show a really clean book-style header/footer layout (running chapter title left, page number right) that works extremely well with md-to-pdf.

ListrError: Something went wrong
    at /home/me/Desktop/gt/torrenzo/node_modules/listr/index.js:102:18
    at async main (/home/me/Desktop/gt/torrenzo/node_modules/md-to-pdf/dist/cli.js:120:5) {
  errors: [
    SyntaxError: Unexpected token 's', "style/config.js" is not valid JSON
        at JSON.parse (<anonymous>)
        at convertMdToPdf (/home/me/Desktop/gt/torrenzo/node_modules/md-to-pdf/dist/lib/md-to-pdf.js:47:51)
  ],
  context: [Object: null prototype] {}
}

That error means md-to-pdf is trying to parse the literal string style/config.js as JSON, which usually happens because the file path was passed to a flag that expects JSON text, not a config file path. The stack trace says the parse failed inside JSON.parse(...), and the docs say --config-file accepts a path, while --pdf-options expects a JSON string.

Most likely, you ran something like this:

md-to-pdf file.md --pdf-options style/config.js

That is wrong, because --pdf-options expects something like:

--pdf-options '{"format":"A4","margin":"25mm 20mm"}'

not a filename. The docs also say the config file can be a .js or .json file, but you must pass it with --config-file.

Use one of these instead.
Correct: JS config file

md-to-pdf file.md --config-file style/config.js

Correct: inline JSON for just PDF options

md-to-pdf file.md --pdf-options '{"format":"A4","margin":"25mm 20mm","printBackground":true}'

Correct: stylesheet path

md-to-pdf file.md --stylesheet style/print.css

A working style/config.js would look like this:

module.exports = {
  stylesheet: ['style/print.css'],
  page_media_type: 'print',
  pdf_options: {
    format: 'A4',
    margin: '25mm 20mm',
    printBackground: true,
    headerTemplate: `
      <style>
        .hdr {
          width: 100%;
          font-size: 10px;
          text-align: center;
          color: #666;
        }
      </style>
      <div class="hdr">
        <span class="title"></span>
      </div>
    `,
    footerTemplate: `
      <div style="width:100%;font-size:10px;text-align:center;color:#666;">
        Page <span class="pageNumber"></span> / <span class="totalPages"></span>
      </div>
    `
  }
}

Then run:

md-to-pdf file.md --config-file style/config.js

Two other gotchas from the docs:

    header/footer need enough top/bottom margin or they overlap content

    for print styling, use --page-media-type print or set page_media_type: 'print' in config

If you paste the exact command you ran, I’ll rewrite it into the correct form.

nice -- i see page number footer but no header

This is a common Puppeteer quirk. If the footer appears but the header doesn’t, it’s almost always one of these three issues.
1. Top margin too small (most common)

Puppeteer does not reserve space automatically. If the top margin is too small, the header gets clipped.

Make sure the top margin is ≥ 20–30 mm.

pdf_options: {
  format: 'A4',
  margin: {
    top: '30mm',
    bottom: '25mm',
    left: '20mm',
    right: '20mm'
  },
  printBackground: true,
}

or:

margin: '30mm 20mm 25mm 20mm'

(top right bottom left)
2. Header needs explicit width + margin

Headers sometimes render off-page unless centered properly.

Use something like this:

headerTemplate: `
<style>
.header {
  width: 100%;
  font-size: 10px;
  padding: 0 20px;
  text-align: center;
  color: #666;
}
</style>

<div class="header">
  <span class="title"></span>
</div>
`,

3. displayHeaderFooter

Normally md-to-pdf enables it automatically, but sometimes you must set it manually.

pdf_options: {
  displayHeaderFooter: true
}

Working minimal example

This always works:

module.exports = {
  stylesheet: ['style/print.css'],
  page_media_type: 'print',

  pdf_options: {
    format: 'A4',
    margin: {
      top: '30mm',
      bottom: '25mm',
      left: '20mm',
      right: '20mm'
    },
    printBackground: true,
    displayHeaderFooter: true,

    headerTemplate: `
      <div style="width:100%;font-size:10px;text-align:center;color:#666;">
        <span class="title"></span>
      </div>
    `,

    footerTemplate: `
      <div style="width:100%;font-size:10px;text-align:center;color:#666;">
        Page <span class="pageNumber"></span> / <span class="totalPages"></span>
      </div>
    `
  }
}

Run:

md-to-pdf doc.md --config-file style/config.js

Quick debugging trick

Replace the header with something obvious:

HEADER TEST

If that appears, the problem is CSS/layout. If not, it’s margin.

💡 Tip: Puppeteer headers support three alignment blocks which look really good in PDFs:

<div style="width:100%;font-size:10px;padding:0 20px;">
  <span style="float:left">Torrenzo Docs</span>
  <span style="float:right"><span class="pageNumber"></span></span>
</div>

If you want, I can also show you a very nice “book-style” header layout (chapter title on left, page number on right) that works perfectly with md-to-pdf.

i see the footer, but no header?

module.exports = {
  stylesheet: ['style.css'],
  page_media_type: 'print',
  pdf_options: {
    format: 'A4',
    margin: '25mm 20mm',
    printBackground: true,

    headerTemplate: 
      <style>
        .hdr{
          font-family: InterVariable;
          font-size:10px;
          width:100%;
          text-align:center;
          color:#666;
        }
      </style>
      <div class="hdr">
        <span class="title">header</span>
      </div>
    ,

    footerTemplate: 
      <div style="font-family:InterVariable;font-size:10px;text-align:center;width:100%">
        Page <span class="pageNumber"></span> / <span class="totalPages"></span>
      </div>
    
  }
}

Yes — the most likely problem is this line:

<span class="title">header</span>

In Puppeteer, .title is a special placeholder class that gets replaced with the document title, not your literal text. If no document title is set, that span can render blank. Puppeteer documents title, date, url, pageNumber, and totalPages as injected classes inside headerTemplate / footerTemplate.

So your header is probably there, but its only visible content is being replaced with nothing.

Use plain text instead:

module.exports = {
  stylesheet: ['style.css'],
  page_media_type: 'print',
  pdf_options: {
    format: 'A4',
    margin: '30mm 20mm 25mm 20mm',
    printBackground: true,
    displayHeaderFooter: true,

    headerTemplate: `
      <div style="width:100%; font-size:10px; text-align:center; color:#666;">
        header
      </div>
    `,

    footerTemplate: `
      <div style="width:100%; font-size:10px; text-align:center; color:#666;">
        Page <span class="pageNumber"></span> / <span class="totalPages"></span>
      </div>
    `
  }
}

If you want the actual document title, use:

<span class="title"></span>

with no inner text. That class is specifically reserved for the injected title value.

Two more things worth changing:

    Increase the top margin. Puppeteer headers/footers need enough page margin or they can get clipped/overlap content. md-to-pdf’s own docs call this out.

    Set displayHeaderFooter: true explicitly even though md-to-pdf often enables it when templates are present. Puppeteer’s underlying PDF option is off by default.

A good diagnostic test is this minimal header:

headerTemplate: `<div style="font-size:10px; width:100%; text-align:center;">HEADER TEST</div>`

If that shows, the issue was the .title placeholder, not the header mechanism itself.

can i use my style styles on this?

Short answer: not automatically.
Puppeteer does not load your page stylesheet inside headerTemplate / footerTemplate. The header/footer are rendered in a separate mini HTML document, so your style.css is ignored there.

So this won’t work:

<div class="hdr">Header</div>

even if .hdr exists in style.css.

You have three workable options.
1. Inline the styles (most common)

Put a <style> block inside the template.

headerTemplate: `
<style>
.hdr {
  font-family: InterVariable, sans-serif;
  font-size: 10px;
  width: 100%;
  text-align: center;
  color: #666;
}
</style>

<div class="hdr">
  Header
</div>
`

This is the most reliable method.
2. Inline styles directly

Simplest option:

headerTemplate: `
<div style="font-family:InterVariable;font-size:10px;width:100%;text-align:center;color:#666;">
  Header
</div>
`

3. Inject your font again (important)

Even if your main document loads fonts, the header/footer won’t inherit them.

So you may need:

<style>
@font-face {
  font-family: InterVariable;
  src: url("style/InterVariable.ttf") format("truetype");
}
</style>

inside the template.
Example using your fonts

headerTemplate: `
<style>
@font-face {
  font-family: InterVariable;
  src: url("style/InterVariable.ttf") format("truetype");
}

.hdr {
  font-family: InterVariable;
  font-size: 10px;
  width: 100%;
  text-align: center;
  color: #666;
}
</style>

<div class="hdr">
  Torrenzo Documentation
</div>
`,

Tip: good header layout

Puppeteer headers work nicely with this pattern:

<div style="width:100%;font-size:10px;padding:0 20px;">
  <span style="float:left">Torrenzo Docs</span>
  <span style="float:right">Page <span class="pageNumber"></span></span>
</div>

✅ Best practice

    Keep page styling in style.css

    Put header/footer styles inside the template

This is how most Puppeteer PDF pipelines work.

If you want, I can also show a much cleaner way to reuse your CSS variables (--text, --accent, etc.) inside the header/footer, so your PDF theme stays consistent.

